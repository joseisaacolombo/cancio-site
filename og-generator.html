<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        canvas {
            border: 1px solid #ddd;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="1200" height="630"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Gradiente de fondo (negro a azul oscuro)
        const gradient = ctx.createLinearGradient(0, 0, 1200, 630);
        gradient.addColorStop(0, '#0a0a0a');
        gradient.addColorStop(1, '#1a2a4a');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 1200, 630);
        
        // Círculo decorativo (top left)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.beginPath();
        ctx.arc(150, 150, 120, 0, Math.PI * 2);
        ctx.fill();
        
        // Círculo decorativo (bottom right)
        ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.beginPath();
        ctx.arc(1100, 550, 100, 0, Math.PI * 2);
        ctx.fill();
        
        // Texto principal: Cancio (en Great Vibes style)
        ctx.font = 'italic 140px "Great Vibes", "Brush Script MT", cursive';
        ctx.fillStyle = '#FFFFFF';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('Cancio', 600, 280);
        
        // Línea decorativa
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(300, 350);
        ctx.lineTo(900, 350);
        ctx.stroke();
        
        // Subtítulo
        ctx.font = 'normal 36px "Segoe UI", sans-serif';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.textAlign = 'center';
        ctx.fillText('Servicios Digitales', 600, 420);
        
        // Tagline
        ctx.font = 'normal 20px "Segoe UI", sans-serif';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.textAlign = 'center';
        ctx.fillText('Presencia Web • Automatización • IA', 600, 480);
        
        // URL
        ctx.font = 'normal 18px "Segoe UI", sans-serif';
        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
        ctx.textAlign = 'center';
        ctx.fillText('cancio.mx', 600, 560);
        
        // Exportar como PNG
        setTimeout(() => {
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'og-preview.png';
                document.body.innerHTML = '<h2>✅ og-preview.png descargado. Copia a tu proyecto.</h2>';
            }, 'image/png', 0.95);
        }, 500);
    </script>
</body>
</html>

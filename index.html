<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CANCIO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        
        .container {
            text-align: center;
            padding: 20px;
        }
        
        h1 {
            color: #ffffff;
            font-size: 120px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            line-height: 1;
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 72px;
                letter-spacing: 4px;
            }
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 48px;
                letter-spacing: 2px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CANCIO</h1>
    </div>
</body>
</html>
